[build]
  publish = "."
  # No build command — pure static files

# Only alias /chat → /chat.html as a convenience.
# Do NOT add a /* catch-all here. This is a multi-page app,
# not an SPA. Each file must be served directly by filename.
[[redirects]]
  from   = "/chat"
  to     = "/chat.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
